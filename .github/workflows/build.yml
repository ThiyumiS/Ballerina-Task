name: Build my-app

on:
  push:
    branches:
      - main
    paths:
      - frontend/my-app/**
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-frontend-build.yml
    with:
      app_name: my-app
      app_path: frontend/my-app
      bump_type: patch
      node_version: "20"
      build_command: npm run build
      output_dir: build
    secrets:
      REACT_APP_API_BASE: ${{ secrets.REACT_APP_API_BASE }}
