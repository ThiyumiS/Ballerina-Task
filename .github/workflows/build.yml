name: Frontend Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/my-app/package-lock.json

      - name: Validate API base secret
        env:
          REACT_APP_API_BASE: ${{ secrets.REACT_APP_API_BASE }}
        run: |
          if [ -z "$REACT_APP_API_BASE" ]; then
            echo "REACT_APP_API_BASE secret is empty or not set"
            exit 1
          fi

      - name: Run Build Script
        working-directory: frontend/my-app
        env:
          REACT_APP_API_BASE: ${{ secrets.REACT_APP_API_BASE }}
        run: |
          npm ci
          npm run build