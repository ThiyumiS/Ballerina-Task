name: Frontend Build And Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/my-app/package-lock.json

      - name: Validate API base secret
        env:
          REACT_APP_API_BASE: ${{ secrets.REACT_APP_API_BASE }}
        run: |
          if [ -z "$REACT_APP_API_BASE" ]; then
            echo "REACT_APP_API_BASE secret is empty or not set"
            exit 1
          fi

      - name: Calculate next version
        id: versioning
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0")
          VERSION_ONLY=${LATEST_TAG#v}
          IFS='.' read -r major minor <<< "$VERSION_ONLY"

          NEW_MINOR=$((minor + 1))
          NEW_TAG="v$major.$NEW_MINOR"
          NEW_VERSION="$major.$NEW_MINOR"

          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Build frontend
        working-directory: frontend/my-app
        env:
          REACT_APP_API_BASE: ${{ secrets.REACT_APP_API_BASE }}
        run: |
          npm ci
          npm run build

      - name: Rename build folder with version
        working-directory: frontend/my-app
        run: |
          mv build "build-${{ steps.versioning.outputs.tag }}"
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versioning.outputs.tag }}
          name: Release ${{ steps.versioning.outputs.tag }}
          body: |
            Frontend release for version ${{ steps.versioning.outputs.version }}.
            Build folder renamed in workflow run to:
            frontend/my-app/build-${{ steps.versioning.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}