name: Frontend Build Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/my-app/package-lock.json

      - name: Build frontend
        working-directory: frontend/my-app
        env:
          REACT_APP_API_BASE: ${{ secrets.REACT_APP_API_BASE }}
        run: |
          npm ci
          npm run build
          mv build release-build
          zip -r release-build.zip release-build

      - name: Create release and upload build
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Frontend Build ${{ github.run_number }}
          files: frontend/my-app/release-build.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
