<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator App</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f5f7fb;
      }
      .container {
        max-width: 460px;
        margin: 48px auto;
        background: #ffffff;
        border: 1px solid #dce1ef;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 6px 20px rgba(28, 39, 77, 0.08);
      }
      h1 { margin-top: 0; }
      .row {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }
      input, select, button {
        padding: 10px;
        font-size: 14px;
      }
      input { flex: 1; }
      button {
        width: 100%;
        border: none;
        background: #1746d3;
        color: #fff;
        border-radius: 6px;
        cursor: pointer;
      }
      #result {
        margin-top: 14px;
        font-weight: bold;
      }
      .meta {
        margin-top: 18px;
        color: #5d6480;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>App 1: Calculator</h1>
      <div class="row">
        <input id="first" type="number" placeholder="First number" />
        <select id="op">
          <option value="+">+</option>
          <option value="-">-</option>
          <option value="*">*</option>
          <option value="/">/</option>
        </select>
        <input id="second" type="number" placeholder="Second number" />
      </div>
      <button id="calc">Calculate</button>
      <div id="result">Result: -</div>
      <div class="meta">version: 0.1.0</div>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
